<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Scroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container" id="mainView">
    <header>
      <div class="logo-area">
        <h1>Aura <span>Flow</span></h1>
      </div>
      <button id="toggleBtn" class="main-toggle">Start</button>
    </header>

    <div class="modes-grid">
      <button class="mode-card active" data-mode="zen" title="Zen: Smooth flow">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </span>
        <span class="label">Zen</span>
      </button>
      <button class="mode-card" data-mode="turbo" title="Turbo: Fast scanning">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 14 1.45-2.9A2 2 0 0 0 6 9.38L3 9h4a2 2 0 0 1 2 2v1c0 1.1.9 2 2 2h4a2 2 0 0 1 2 2v1a2 2 0 0 0 2 2h4M9 3l1 1"/><path d="M2.5 19h19"/><path d="M10 19l1-3h4l1 3"/></svg>
        </span>
        <span class="label">Turbo</span>
      </button>
      <button class="mode-card" data-mode="pulse" title="Reel: Auto-swipe">
        <div id="goToSettings" class="card-gear" title="Reel Settings">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.934a.5.5 0 0 0-.777-.416L16 11"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>
        </span>
        <span class="label">Reel</span>
      </button>
    </div>

    <div class="control-section">
      <div class="label-row">
        <span>Direction</span>
        <div class="direction-toggle" id="dirToggle" title="Toggle scrolling Up or Down">
          <span class="active" data-dir="down">Down</span>
          <span data-dir="up">Up</span>
        </div>
      </div>
      <div class="label-row">
        <span>Velocity</span>
        <span id="speedValue">1.0x</span>
      </div>
      <input type="range" id="speedSlider" min="0.1" max="10" step="0.1" value="1.0" title="Adjust scrolling speed">
      <div class="slider-track-glow"></div>
    </div>

    <div class="control-section">
      <div class="label-row">
        <span title="Performance optimization & RAM management">Aura Boost</span>
        <label class="switch">
          <input type="checkbox" id="boostToggle">
          <span class="slider-toggle"></span>
        </label>
      </div>
    </div>

  </div>

  <!-- Minimal Settings View -->
  <div class="container hidden" id="settingsView">
    <div class="header-minimal">
      <span>Reel Timing</span>
      <button id="backToMain" class="close-btn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="custom-stepper mini">
      <button id="decInterval" class="stepper-btn">-</button>
      <input type="number" id="reelInterval" value="15" readonly>
      <button id="incInterval" class="stepper-btn">+</button>
    </div>
    
    <div class="info-text">Wait time before auto-swipe.</div>
    <div id="saveStatus">Synced</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
