<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Scroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container" id="mainView">
    <header>
      <div class="logo-area">
        <h1>Aura <span>Flow</span></h1>
      </div>
      <button id="toggleBtn" class="main-toggle">Start</button>
    </header>

    <div class="modes-grid">
      <button class="mode-card active" data-mode="zen">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </span>
        <span class="label">Zen</span>
      </button>
      <button class="mode-card" data-mode="turbo">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 14 1.45-2.9A2 2 0 0 0 6 9.38L3 9h4a2 2 0 0 1 2 2v1c0 1.1.9 2 2 2h4a2 2 0 0 1 2 2v1a2 2 0 0 0 2 2h4M9 3l1 1"/><path d="M2.5 19h19"/><path d="M10 19l1-3h4l1 3"/></svg>
        </span>
        <span class="label">Turbo</span>
      </button>
      <button class="mode-card" data-mode="pulse">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.934a.5.5 0 0 0-.777-.416L16 11"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>
        </span>
        <span class="label">Reel</span>
      </button>
    </div>

    <div class="control-section">
      <div class="label-row">
        <span>Direction</span>
        <div class="direction-toggle" id="dirToggle">
          <span class="active" data-dir="down">Down</span>
          <span data-dir="up">Up</span>
        </div>
      </div>
      <div class="label-row">
        <span>Velocity</span>
        <span id="speedValue">1.0x</span>
      </div>
      <input type="range" id="speedSlider" min="0.1" max="10" step="0.1" value="1.0">
      <div class="slider-track-glow"></div>
    </div>

    <div class="control-section">
      <div class="label-row">
        <span>Aura Boost</span>
        <label class="switch">
          <input type="checkbox" id="boostToggle">
          <span class="slider-toggle"></span>
        </label>
      </div>
    </div>

    <div class="info-footer">
      <span>Alt + S to Toggle</span>
      <button id="goToSettings" class="icon-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <!-- Integrated Settings View -->
  <div class="container hidden" id="settingsView">
    <header>
      <button id="backToMain" class="icon-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1>Settings</h1>
      <div></div>
    </header>

    <div class="setting-item">
      <div class="label-row">
        <span>Reel Interval (sec)</span>
      </div>
      <div class="custom-stepper">
        <button id="decInterval">-</button>
        <input type="number" id="reelInterval" value="15" readonly>
        <button id="incInterval">+</button>
      </div>
    </div>
    
    <div class="info-text">Automatic swiping delay for Reel mode.</div>
    <div id="saveStatus">Saved!</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
